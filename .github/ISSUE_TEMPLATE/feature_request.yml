name: ✨ Feature Request
description: Предложить новую фичу в Prostor
title: "[Feature]: "
labels: ["enhancement", "status:needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Хотите новую возможность в Prostor? Опишите её здесь.
        Хороший запрос содержит **проблему**, **решение** и **альтернативы**.

  - type: dropdown
    id: area
    attributes:
      label: Область
      options:
        - area:agents
        - area:tools
        - area:gateway
        - area:ui
        - area:cli
        - area:skills
        - area:docs
        - area:i18n
        - area:release
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Приоритет (по вашему мнению)
      options:
        - priority:critical (блокирует мою работу)
        - priority:high (нужно в ближайшем релизе)
        - priority:medium (когда-нибудь)
        - priority:low (nice-to-have)
    validations:
      required: false

  - type: textarea
    id: problem
    attributes:
      label: Какую проблему решаем?
      description: Опишите use case / боль / ситуацию, в которой эта фича нужна
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Предлагаемое решение
      description: Как вы представляете реализацию? API, CLI-команда, skill?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Альтернативы, которые вы рассматривали
      description: Workaround'ы, другие подходы, почему они не подходят
    validations:
      required: false

  - type: textarea
    id: examples
    attributes:
      label: Примеры
      description: Примеры использования, желательно в формате CLI/skills
      placeholder: |
        prostor tools install my-skill
        /команда аргументы
    validations:
      required: false

  - type: checkboxes
    id: hacktoberfest
    attributes:
      label: Участие
      options:
        - label: Готов(а) реализовать в PR
        - label: Готов(а) тестировать
        - label: Это для Hacktoberfest
