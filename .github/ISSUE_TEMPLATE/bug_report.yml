name: 🐛 Bug Report
description: Сообщить о баге в Prostor
title: "[Bug]: "
labels: ["bug", "status:needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Спасибо, что нашли время сообщить о баге! 🙏
        Заполните, пожалуйста, шаблон — это сильно ускорит исправление.

  - type: dropdown
    id: area
    attributes:
      label: Область
      description: Где проявляется баг?
      options:
        - area:agents (agent core, run_agent.py)
        - area:tools (tools/, hashline, batch_*)
        - area:gateway (Telegram/Discord/etc)
        - area:ui (Desktop / TUI)
        - area:cli (prostor_cli)
        - area:skills (skills/, Skills Hub)
        - area:ci (.github/workflows)
        - area:docs (docs/, website/)
        - area:i18n (русский перевод)
        - area:release (packaging, installers)
        - не уверен
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Версия Prostor
      description: Например `0.17.0` или `v0.17.0-win-x64.exe`. Если собираете из main — укажите commit SHA.
      placeholder: "0.17.0"
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Платформа
      description: ОС, архитектура, способ установки
      placeholder: "Windows 11, x64, .exe installer"
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Модель и провайдер
      description: Какую модель использовали (Claude Sonnet, GPT-4o, локальная, etc) и через какого провайдера (OpenRouter, Nous Portal, прямой API, etc)
      placeholder: "Claude Sonnet 4 через OpenRouter"
    validations:
      required: false

  - type: textarea
    id: reproduce
    attributes:
      label: Шаги для воспроизведения
      description: Что сделать, чтобы баг проявился?
      placeholder: |
        1. Запустить `prostor`
        2. Отправить команду "..."
        3. Увидеть ошибку "..."
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
      description: Что должно было произойти?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
      description: Что произошло на самом деле?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Логи
      description: Вывод из терминала, стектрейс, скриншот. Можно перетащить картинку.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Чеклист
      options:
        - label: Я проверил, что на `main` проблема воспроизводится
          required: true
        - label: Я искал в существующих issues — не нашёл дубля
          required: true
        - label: Я приложил логи / скриншот / минимальный repro
          required: false
