# Dependabot config — https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options
version: 2

updates:
  # ── GitHub Actions ──────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    # Группировать minor/patch в один PR
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # Labels
    labels:
      - "type:deps"
      - "area:ci"
    # Не открывать больше 5 PR одновременно
    open-pull-requests-limit: 5
    # Коммитить от имени dependabot
    commit-message:
      prefix: "chore(actions)"
      prefix-development: "chore(actions)(dev)"
      include: "scope"

  # ── Python (uv / pip) ───────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:00"
      timezone: "UTC"
    # Только прямые зависимости (требование для Prostor — см. AGENTS.md)
    allow:
      - dependency-type: "direct"
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "type:deps"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(python)"

  # ── npm (для Desktop / TUI) ─────────────────────────────
  - package-ecosystem: "npm"
    directory: "/apps/desktop"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "06:00"
      timezone: "UTC"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "type:deps"
      - "area:ui"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(npm)(desktop)"

  # ── Docker ─────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "06:00"
      timezone: "UTC"
    labels:
      - "type:deps"
      - "area:release"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(docker)"

# Глобальный игнор — major-обновления не открывать автоматически (требуют ручного review)
# Раскомментируйте при необходимости:
# ignore:
#   - dependency-name: "*"
#     update-types: ["version-update:semver-major"]
