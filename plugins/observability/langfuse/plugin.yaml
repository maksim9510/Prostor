name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for Prostor — traces conversations, LLM calls, and tool usage. Opt-in via `prostor plugins enable observability/langfuse` or `prostor tools → Langfuse Observability`."
author: NousResearch
requires_env:
  - PROSTOR_LANGFUSE_PUBLIC_KEY
  - PROSTOR_LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
